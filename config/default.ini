; 次世代CTAボット デフォルト設定
; バックテストとライブ（ペーパー）は本設定を共有する。
; 変更したらコミットハッシュと共に結果を保存すること（再現性の原則）。

[data]
; gen2時代からの共有OHLCVキャッシュ（11ペア, 4H, 2021-2026）
db_path = ~/work/satosystem/ohlcv_data/ohlcv_cache.db
timeframe_min = 240
; BTC/ETHは実funding履歴（data/funding_data.pkl）、他は下記デフォルト年率
funding_pkl = data/funding_data.pkl

[universe]
; 金 + crypto主要。履歴が貯まった資産（銀・株指数perp等）は段階的に追記する
; 金2種（PAXG 2022-03〜が2023whipsaw期をカバー、XAUTは2023〜）+ crypto主要
symbols = PAXG/USDT:USDT, XAUT/USDT:USDT, BTC/USDT:USDT, ETH/USDT:USDT, SOL/USDT:USDT, BNB/USDT:USDT, XRP/USDT:USDT

[strategy]
; マルチホライズンEWMA交差（fast:slow 日数）。符号平均が[-1,1]のシグナル
horizons_days = 10:40, 30:120, 60:240
vol_window_days = 30
; 当初合意は0.30（積極）だったが、Phase 3検証でtv>=0.25は2023whipsawで
; DD40%ハード停止が必発（感応度グリッド全滅）と判明。DD40%キルスイッチと
; 両立する生存上限はtv~0.20、推奨は0.15（Sharpe1.0/年+17.5%/DD28%）。
target_vol = 0.15
max_gross = 3.0
rebalance_days = 1
; 取引除外バンド: |Δノーショナル| が equity のこの比率未満ならスキップ（turnover抑制）
no_trade_band_pct = 0.02

[risk]
; サーキットブレーカー: soft到達でtarget_vol半減、hard到達で全クローズ+停止
dd_soft = 0.35
dd_hard = 0.40

[costs]
; Bybit taker 0.055% + slippage想定 0.05%
fee_rate = 0.00055
slip_rate = 0.0005
min_notional_usd = 5.0
; 実funding履歴が無い資産のデフォルト年率（保守的に常にコスト側で計上）
funding_default_annual_crypto = 0.05
funding_default_annual_gold = 0.01

[capital]
init_capital_usd = 1000
