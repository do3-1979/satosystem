# ========================================
# Trading Bot Configuration
# ========================================

[API]
# 取引所設定
exchange_data = bybit
exchange_trade = bitget

[RiskManagement]
# リスク管理設定
risk_percentage = 0.30
account_balance = 300
leverage = 10
entry_times = 2
entry_range = 4
stop_range = 1
stop_af = 0.02
stop_af_add = 0.02
stop_af_max = 0.20
surge_follow_price_ratio = 0.011
psar_time_frame = 240

[Market]
# 取引市場設定
market = BTC/USDT
time_frame = 240

[Period]
# バックテスト期間設定
start_time = 2025/10/01 00:00
end_time = 2025/12/31 23:59

[Strategy]
# ボラティリティ計算期間（ATR/Keltner Channel用）
volatility_term = 14

# ドンチャンチャネル期間
donchian_buy_term = 30
donchian_sell_term = 30

# PVO（Percentage Volume Oscillator）設定
pvo_s_term = 5
pvo_l_term = 70
pvo_threshold = 10

# PSARルックバック期間
psar_lookback_term = 100

# Strategy A: ADX戦略（メイン戦略）
enable_strategy_a_adx = 1

# Strategy B: BB/RSI/SMA複合戦略
enable_strategy_b_bb_rsi_sma = 0
bb_period = 20
bb_std_dev = 2.0
rsi_period = 14
rsi_overbought = 70
rsi_oversold = 30
sma_fast_period = 50
sma_slow_period = 200

# Strategy C: 複合戦略
enable_strategy_c_combined = 0
macd_fast_period = 12
macd_slow_period = 26
macd_signal_period = 9

# ADX（Average Directional Index）設定
adx_term = 14
adx_continue_num = 3
adx_bull_threshold = 24
adx_bear_threshold = 18

[Potfolio]
# ポートフォリオ設定
lot_limit_lower = 0.0001
balance_tether_limit = 0

[Setting]
# システム設定
server_retry_wait = 120
bot_operation_cycle = 60

[Log]
# ログ設定
log_file = log.txt
log_directory = logs

[OrderExecution]
# 注文実行設定
entry_slippage = 0.5
slippage_multiplier = 1.5
max_entry_retries = 4
max_exit_retries = 3
order_timeout = 30

[Backtest]
# バックテスト設定
back_test = 1
hot_test_dummy_mode = 1
generate_interactive_graph = 1

[EntryFilters]
# エントリーフィルター設定
enable_pvo_filter = 1
enable_adx_filter = 1
adx_filter_threshold = 31
enable_volume_filter = 0
volume_filter_threshold = 15000
enable_volatility_filter = 0
volatility_filter_threshold = 1200

[Seasonality]
# 季節性ポジショニング設定
enable_seasonality_based_positioning = 0
seasonality_loss_quarter_multiplier = 0.7
seasonality_profit_quarter_multiplier = 1.0

[MarketRegime]
# マーケットレジーム検出設定
enable_market_regime_detection = 0
atr_range_threshold_lower = 0.90
atr_range_threshold_upper = 1.10
atr_period = 14
atr_ma_period = 28
swing_lookback_period = 20
enable_entry_condition_strictness_on_range = 1
ranging_position_size_multiplier = 0.7

[VCPStrategy]
# VCP (Volatility Contraction Pattern) 戦略設定
# 評価結果: 2025年で逆効果（-11,537 USD, 勝率22.7%）のため無効化 (2026-01-05)
enable_vcp_strategy = 0
vcp_contraction_ratio = 0.95
vcp_lookback_period = 20
vcp_breakout_threshold = 1.005
vcp_min_confidence = 0.3

[OtherSettings]

