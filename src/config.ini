# ========================================
# Trading Bot Configuration
# ========================================

[API]
# 取引所設定
exchange_data = bybit
exchange_trade = bitget

[RiskManagement]
# リスク管理設定
risk_percentage = 0.30
account_balance = 300
leverage = 10
entry_times = 2
entry_range = 4
stop_range = 1
stop_af = 0.02
stop_af_add = 0.02
stop_af_max = 0.20
surge_follow_price_ratio = 0.011
psar_time_frame = 240

# 動的ポジションサイズ調整（DD低減策1）
enable_dynamic_position_sizing = 0
# 資産比率に応じたリスク調整ティア（資産/初期資本の比率）
# tier_90: 90%以上, tier_70: 70-90%, tier_50: 50-70%, tier_below: 50%未満
dynamic_tier_90_risk = 0.30
dynamic_tier_70_risk = 0.20
dynamic_tier_50_risk = 0.15
dynamic_tier_below_risk = 0.10

[Market]
# 取引市場設定
market = BTC/USDT
time_frame = 240

[Period]
# バックテスト期間設定
start_time = 2024/01/01 00:00
end_time = 2024/03/31 23:59

[Strategy]
# ボラティリティ計算期間（ATR/Keltner Channel用）
volatility_term = 14

# ドンチャンチャネル期間
donchian_buy_term = 30
donchian_sell_term = 30

# PVO（Percentage Volume Oscillator）設定
pvo_s_term = 5
pvo_l_term = 70
pvo_threshold = 10

# PSARルックバック期間
psar_lookback_term = 100

# Strategy A: ADX戦略（メイン戦略）
enable_strategy_a_adx = 1

# Strategy B: BB/RSI/SMA複合戦略
enable_strategy_b_bb_rsi_sma = 0
bb_period = 20
bb_std_dev = 2.0
rsi_period = 14
rsi_overbought = 70
rsi_oversold = 30
sma_fast_period = 50
sma_slow_period = 200

# Strategy C: 複合戦略
enable_strategy_c_combined = 0
macd_fast_period = 12
macd_slow_period = 26
macd_signal_period = 9

# ADX（Average Directional Index）設定
adx_term = 14
adx_continue_num = 3
adx_bull_threshold = 24
adx_bear_threshold = 18

[Potfolio]
# ポートフォリオ設定
lot_limit_lower = 0.0001
balance_tether_limit = 0

[Setting]
# システム設定
server_retry_wait = 120
bot_operation_cycle = 60

[Log]
# ログ設定
log_file = log.txt
log_directory = logs

[OrderExecution]
# 注文実行設定
entry_slippage = 0.5
slippage_multiplier = 1.5
max_entry_retries = 4
max_exit_retries = 3
order_timeout = 30

[Backtest]
# バックテスト設定
back_test = 1
hot_test_dummy_mode = 1
generate_interactive_graph = 1

[EntryFilters]
# エントリーフィルター設定
enable_pvo_filter = 1
enable_adx_filter = 1
adx_filter_threshold = 31
enable_volume_filter = 0
volume_filter_threshold = 15000
enable_volatility_filter = 0
volatility_filter_threshold = 1200

[Seasonality]
# 季節性ポジショニング設定
enable_seasonality_based_positioning = 0
seasonality_loss_quarter_multiplier = 0.7
seasonality_profit_quarter_multiplier = 1.0

[MarketRegime]
# マーケットレジーム検出設定
enable_market_regime_detection = 0
atr_range_threshold_lower = 0.90
atr_range_threshold_upper = 1.10
atr_period = 14
atr_ma_period = 28
swing_lookback_period = 20
enable_entry_condition_strictness_on_range = 1
ranging_position_size_multiplier = 0.7

[VCPStrategy]
# VCP (Volatility Contraction Pattern) 戦略設定
# 評価結果: 2025年で逆効果（-11,537 USD, 勝率22.7%）のため無効化 (2026-01-05)
enable_vcp_strategy = 0
vcp_contraction_ratio = 0.95
vcp_lookback_period = 20
vcp_breakout_threshold = 1.005
vcp_min_confidence = 0.3

[MeanReversionStrategy]
# Mean Reversion (平均回帰) 戦略 - BB 2σ逸脱 + RSI < 30
# Phase 1評価完了: NO-GO判定（PF=0.07, WinRate=7.14%, 2026-01-07）
# 2025 Q1評価で採用基準未達（PF>0.8, WinRate>40%）のため不採用
enable_mean_reversion_strategy = 0
bb_period = 20                        # Bollinger Band期間
bb_std_dev = 2.0                      # Bollinger Band標準偏差倍率
rsi_period = 14                       # RSI期間
rsi_oversold_threshold = 30           # RSI売られすぎ閾値

[RangeBreakoutEnhanced]
# Range Breakout Enhanced 戦略 - Donchian強化版（Task 38c, 2026-01-07）
# 目的: 偽ブレイク回避 + 出来高確認で2025年成績改善
enable_range_breakout_enhanced = 1

# ブレイク確認閾値（%）- Donchian高値/安値から何%以上ブレイクで有効
# 注: Donchianシグナルは境界を超えた時点で発生するが、次足で価格が戻る可能性あり
# 0.0 = ブレイク強度フィルターOFF（相対出来高のみ）
breakout_threshold_percent = 0.0

# 相対出来高閾値（倍率）- 平均出来高の何倍以上で有効
relative_volume_threshold = 1.5
relative_volume_lookback = 20        # 平均出来高計算期間

# ATR正規化（将来実装予定）
enable_atr_normalization = 0
atr_breakout_multiplier = 2.0

# レンジ相場判定（将来実装予定）
range_detection_atr_multiplier = 3.0

[TrailingProfitTarget]
# Trailing Profit Target 戦略（Task 39a, 2026-01-11）
# 目的: 利益確定の最適化、Q4 2024のような大勝ちトレードの利益を守る
# 期待効果: +$200-400/年
enable_trailing_profit = 1

# Tier 1: 2%利益到達時
profit_tier1_threshold = 0.02        # エントリー価格の2%
profit_tier1_stop_multiplier = 1.5   # ボラティリティの1.5倍でトレーリングストップ

# Tier 2: 5%利益到達時
profit_tier2_threshold = 0.05        # エントリー価格の5%
profit_tier2_stop_multiplier = 1.0   # ボラティリティの1.0倍（より厳格）

# Tier 3: 10%利益到達時（超大勝ち）
profit_tier3_threshold = 0.10        # エントリー価格の10%
profit_tier3_stop_multiplier = 0.8   # ボラティリティの0.8倍（さらに厳格）

[TimeBasedExit]
# Time-Based Exit 戦略（Task 39d, 2026-02-08）
# 目的: 長期保有ポジションの強制決済による塩漬け防止
# 期待効果: +$100-200/年（特にQ1 2025の-143 USD損失を削減）
enable_time_based_exit = 1

# 保有時間制限（時間）
max_holding_hours = 72               # 72時間 = 3日間（240分足で18本分）

[CostModel]
# Task 40b: コストモデル設定
# バックテストに実取引のコスト（手数料・スリッページ）を織り込む
# 
# 目的: バックテスト結果を実取引により近づける
# 期待効果: ベースライン比-3～-5%程度の損益減少（より現実的な評価）
#
# enabled: 0=無効（デフォルト）、1=有効
# maker_fee: メイカー手数料率（%）
# taker_fee: テイカー手数料率（%）
# slippage_rate: スリッページ率（%、買いは不利、売りは不利）
# execution_delay_candles: 約定遅延（足数、シグナル発生から実約定までの遅延）

# デフォルト無効（検証完了後、必要に応じて有効化）
enabled = 0
maker_fee = 0.02
taker_fee = 0.05
slippage_rate = 0.02
execution_delay_candles = 1

[OtherSettings]

