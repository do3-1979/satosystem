[API]
# .api_key に api_key, api_secret を記載しておき、backtest.py で差し替えます
# 置換対象のプレースホルダー（commit可）
api_key = YOUR_API_KEY
api_secret = YOUR_API_SECRET

[RiskManagement]
risk_percentage = 0.85
account_balance = 300
# レバレッジ倍率の設定
leverage = 100
# ピラミッディング制御
# 最適化結果: entry_times=4 がバランス型で推奨 (PnL=107.10, DD=49.75%, Score=215.27)
entry_times = 4
entry_range = 2
# ストップ制御
stop_range = 2
# ストップパラボリックSAR
# 加速係数
stop_AF = 0.02
# 加速係数を増やす度合
stop_AF_add = 0.02
# 加速係数の上限
stop_AF_max = 0.20
# 急騰追従時のストップ値近傍レート
surge_follow_price_ratio = 0.011
# PSAR時間軸
psar_time_frame = 120

# 取引分類パラメータ
# k2: TREND分類の MFE/ATR 閾値 (最適化済: 2.2, MFE p60-70=2.06-2.86)
# k3: FALSE_BREAK分類の MAE/ATR 閾値 (最適化済: 1.6, MAE p60-70=1.71-1.94)
# 2024年間データ分析結果: k2=2.2, k3=1.6 で TREND 66件(41.8% PnL捕捉), FALSE_BREAK 52件
classification_k2 = 2.2
classification_k3 = 1.6

[Market]
market = BTC/USD
time_frame = 120
# time_frame unit: minutes

[Period]
# Baseline評価 (時間ベースEXIT 無効) 2025 年期間
start_time = 2024/01/01 0:00
#end_time = None
end_time = 2024/02/29 23:59

[Strategy]
# ボラティリティ期間
volatility_term = 14
# ドンチャンチャネル制御
donchian_buy_term = 20
donchian_sell_term = 20
# Keltnerバンドフィルタ
keltner_ema_period = 10
keltner_atr_multiplier = 1.5
keltner_enabled = False
# 出来高オシレータ(PVO)戦略
# 出来高オシレータのEMA（短)の期間
pvo_s_term = 5
# 出来高オシレータのEMA（長)の期間
pvo_l_term = 26
# 出来高オシレータの閾値(%)
pvo_threshold = 0

# 部分利確 (PARTIAL EXIT) 設定
# 利確判定を有効にするか
partial_exit_enabled = False
# 利確発動の最低利益率 (例: 0.10 = 10%)
partial_exit_profit_rate = 0.10
# 利確時に決済する保有数量比率 (0.5 = 50%)
partial_exit_ratio = 0.50
# 利確判定に必要な最低保持バー数 (0で無条件)
partial_exit_min_bars = 0

# EXIT改善設定
# 時間ベースEXIT: 保持期間上限(バー数、0で無効)
max_hold_bars = 0
# ADX連動エントリー: 最低ADX閾値(0で無効)
min_adx_for_entry = 0
# ボラティリティ急縮小EXIT: ATR縮小率閾値(0で無効、例: 0.5=50%縮小)
atr_shrink_exit_ratio = 0
# 時間帯フィルタ: 除外時間帯(カンマ区切り、空で無効) 例: "0,1,2,3,4,5"
excluded_hours = 
# トレーリングストップ強化: 最高益からの固定%下落(0で無効)
max_profit_drawdown_pct = 0

[Potfolio]
# 注文できる最小lot数計算倍率
lot_limit_lower = 0.0001
# 注文できる最小証拠金[USD]
balance_tether_limit = 0

[Setting]
# server_retry_wait unit: seconds
# bot_operation_cycle unit: seconds
server_retry_wait = 120
bot_operation_cycle = 60
; 全体実行タイムアウト（秒）: 応答が返らない場合の上限
; 72時間連続稼働テスト用: 259200秒 = 72h
run_timeout_seconds = 259200
; APIリクエストのタイムアウト（秒）: ccxt の HTTP タイムアウト
api_request_timeout_seconds = 20
; APIリトライ最大秒数（秒）: これを超えたら諦める
api_max_retry_seconds = 120

[Log]
log_file = log.txt
log_directory = logs
report_directory = report

[Backtest]
back_test = 0

[DummyTrading]
# ダミー取引モード: 実際の注文を出さずに模擬取引を実行
# 1: ON (注文を出さない、ログのみ記録)
# 0: OFF (実際の取引を実行)
dummy_mode = 1

[OtherSettings]
# 他の設定情報をここに追加できます
