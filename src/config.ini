# ========================================
# Trading Bot Configuration
# ========================================

[API]
# 取引所設定
exchange_data = bybit
exchange_trade = bitget

[RiskManagement]
# リスク管理設定
risk_percentage = 0.30
account_balance = 300
leverage = 10
entry_times = 2
entry_range = 4
stop_range = 1
stop_af = 0.02
stop_af_add = 0.02
stop_af_max = 0.15
surge_follow_price_ratio = 0.011
psar_time_frame = 240

# 動的ポジションサイズ調整（DD低減策1）
enable_dynamic_position_sizing = 1
# 資産比率に応じたリスク調整ティア（資産/初期資本の比率）
# tier_90: 90%以上, tier_70: 70-90%, tier_50: 50-70%, tier_below: 50%未満
dynamic_tier_90_risk = 0.30
dynamic_tier_70_risk = 0.20
dynamic_tier_50_risk = 0.15
dynamic_tier_below_risk = 0.10

# H-035: VolatilityTargeting（動的レバレッジ調整）
# 現在のATRが過去N期間の中央値より高い場合にレバレッジを削減し、DDを抑制する
# volatility_targeting_enabled: 0=無効（デフォルト）、1=有効
# vt_atr_median_term: ATR中央値を計算する期間（本数）
# vt_lev_normal: ATR < 中央値×1.5 のとき使用するレバレッジ（通常時）
# vt_lev_medium: ATR >= 中央値×1.5 のとき使用するレバレッジ（高ボラ時）
# vt_lev_high:   ATR >= 中央値×2.0 のとき使用するレバレッジ（超高ボラ時）
volatility_targeting_enabled = 0
vt_atr_median_term = 50
vt_lev_normal = 10
vt_lev_medium = 7
vt_lev_high = 5

[Market]
# 取引市場設定
market = BTC/USDT
time_frame = 240

[Period]
# バックテスト期間設定
start_time = 2026/01/01 00:00
end_time = 2026/03/31 23:59

[Strategy]
# ボラティリティ計算期間（ATR/Keltner Channel用）
volatility_term = 14

# ドンチャンチャネル期間
donchian_buy_term = 25
donchian_sell_term = 25

# PVO（Percentage Volume Oscillator）設定
pvo_s_term = 4
pvo_l_term = 35
pvo_threshold = 10

# PSARルックバック期間
psar_lookback_term = 300

# Strategy A: ADX戦略（メイン戦略）
enable_strategy_a_adx = 1

# Strategy B: BB/RSI/SMA複合戦略
enable_strategy_b_bb_rsi_sma = 0
bb_period = 20
bb_std_dev = 2.0
rsi_period = 14
rsi_overbought = 70
rsi_oversold = 30
sma_fast_period = 50
sma_slow_period = 200

# Strategy C: 複合戦略
enable_strategy_c_combined = 0
macd_fast_period = 12
macd_slow_period = 26
macd_signal_period = 9

# ADX（Average Directional Index）設定
adx_term = 14
adx_continue_num = 3
adx_bull_threshold = 26
adx_bear_threshold = 18

[Potfolio]
# ポートフォリオ設定
lot_limit_lower = 0.0001
balance_tether_limit = 0

[Setting]
# システム設定
server_retry_wait = 120
bot_operation_cycle = 60

[Log]
# ログ設定
log_file = log.txt
log_directory = logs

[OrderExecution]
# 注文実行設定
entry_slippage = 0.5
slippage_multiplier = 1.5
max_entry_retries = 4
max_exit_retries = 3
order_timeout = 30

[Backtest]
# バックテスト設定
back_test = 1
hot_test_dummy_mode = 1
generate_interactive_graph = 1
# キャッシュベースホットテスト: 0=APIリアルタイム取得, 1=キャッシュ高速実行（[Period]のstart_time/end_timeを使用）
use_cached_data_for_hot_test = 0

[EntryFilters]
# エントリーフィルター設定
enable_pvo_filter = 1
enable_adx_filter = 1
adx_filter_threshold = 28
enable_volume_filter = 0
volume_filter_threshold = 15000
enable_volatility_filter = 1
volatility_filter_threshold = 2500
weekend_filter_enabled = 0
# H-013: 時間帯フィルター (Session Filter)
# 原理: 4H足クローズ時刻(JST)が低勝率の時間帯 → エントリー禁止
# BTCバックテスト分析: 01:00 JST (= UTC 16:00) = アジア早朝 = 勝率43%(7トレード中3勝4敗)
# 他時間帯は全て67%以上
session_filter_enabled = 0
session_filter_block_hours = 1
# 方向性フィルター群（論文ベース、デフォルト無効）
# Brock, Lakonishok, LeBaron (1992) JF ~3000citations / Faber (2007) JOIM
sma_direction_filter_enabled = 0
sma_direction_filter_period = 500
# Liu & Tsyvinski (2021) RFS ~300citations / Wilder (1978)
rsi_direction_filter_enabled = 0
rsi_direction_filter_period = 14
# Appel (1985) / Murphy (1999)
macd_direction_filter_enabled = 0
# Moskowitz, Ooi, Pedersen (2012) JFE ~4000citations
tsmom_filter_enabled = 1
tsmom_filter_lookback = 150
# ADXスロープフィルター (Elder 1993 "Trading for a Living")
# 原理: ADXが上昇中 = トレンド強化中 = 高品質エントリー
adx_slope_filter_enabled = 0
adx_slope_filter_lookback = 10
# 確認バーフィルター (Donchian Breakout Confirmation)
# 原理: ブレイクアウト後1バー待ち、価格がチャネル外を維持→偽ブレイク除去
donchian_confirmation_enabled = 0
donchian_confirmation_bars = 1
# Funding Rateフィルター (資金調達率による過熱抑制)
# 原理: FR>+0.05% = Long過多・過熱 → BUYエントリー抑制
#       FR<-0.05% = Short過多・過熱 → SELLエントリー抑制
funding_rate_filter_enabled = 1
funding_rate_buy_threshold = 0.0005
funding_rate_sell_threshold = -0.0005

# 日足MTFフィルター (Multi-Timeframe Regime Detection)
# 4H足OHLCVを6本集約して日足ADXを計算、閾値未満ならレンジ相場判定でエントリー禁止
mtf_daily_filter_enabled = 0
mtf_daily_adx_threshold = 20
mtf_daily_adx_period = 14

# ハースト指数フィルター (Hurst Exponent - R/S Analysis)
# H < 0.5 = 平均回帰（レンジ相場）→ エントリー禁止
# H >= 0.5 = トレンド持続性あり → エントリー許可
hurst_filter_enabled = 0
hurst_lookback = 100
hurst_threshold = 0.5

# H-011: ADX適応型ポジションサイズ調整
# 原理: ADXが弱い（ギリギリ閾値超え）ときは損失リスクが高い → サイズ削減
# adx_filter_threshold(31) <= ADX < adx_size_strong_threshold(38) → weak_multiplier倍
# ADX >= adx_size_strong_threshold(38) → 通常サイズ(1.0倍)
adx_size_scaling_enabled = 0
adx_size_strong_threshold = 38
adx_size_weak_multiplier = 0.5

[Seasonality]
# 季節性ポジショニング設定
enable_seasonality_based_positioning = 0
seasonality_loss_quarter_multiplier = 0.7
seasonality_profit_quarter_multiplier = 1.0

[MarketRegime]
# マーケットレジーム検出設定
enable_market_regime_detection = 0
atr_range_threshold_lower = 0.90
atr_range_threshold_upper = 1.10
atr_period = 14
atr_ma_period = 28
swing_lookback_period = 20
enable_entry_condition_strictness_on_range = 1
ranging_position_size_multiplier = 0.7

[VCPStrategy]
# VCP (Volatility Contraction Pattern) 戦略設定
# 評価結果: 2025年で逆効果（-11,537 USD, 勝率22.7%）のため無効化 (2026-01-05)
enable_vcp_strategy = 0
vcp_contraction_ratio = 0.95
vcp_lookback_period = 20
vcp_breakout_threshold = 1.005
vcp_min_confidence = 0.3

[MeanReversionStrategy]
# Mean Reversion (平均回帰) 戦略 - BB 2σ逸脱 + RSI < 30
# Phase 1評価完了: NO-GO判定（PF=0.07, WinRate=7.14%, 2026-01-07）
# 2025 Q1評価で採用基準未達（PF>0.8, WinRate>40%）のため不採用
enable_mean_reversion_strategy = 0
bb_period = 20                        # Bollinger Band期間
bb_std_dev = 2.0                      # Bollinger Band標準偏差倍率
rsi_period = 14                       # RSI期間
rsi_oversold_threshold = 30           # RSI売られすぎ閾値

[RangeBreakoutEnhanced]
# Range Breakout Enhanced 戦略 - Donchian強化版（Task 38c, 2026-01-07）
# 目的: 偽ブレイク回避 + 出来高確認で2025年成績改善
enable_range_breakout_enhanced = 1

# ブレイク確認閾値（%）- Donchian高値/安値から何%以上ブレイクで有効
# 0.0 = ブレイク強度フィルターOFF（相対出来高のみ）
breakout_threshold_percent = 0.0

# 相対出来高閾値（倍率）- 平均出来高の何倍以上で有効
relative_volume_threshold = 1.5
relative_volume_lookback = 20        # 平均出来高計算期間

# ATR正規化（将来実装予定）
enable_atr_normalization = 0
atr_breakout_multiplier = 2.0

# レンジ相場判定（将来実装予定）
range_detection_atr_multiplier = 3.0

[TrailingProfitTarget]
# Trailing Profit Target 戦略（Task 39a, 2026-01-11）
# 目的: 利益確定の最適化、Q4 2024のような大勝ちトレードの利益を守る
enable_trailing_profit = 1

# Tier 1: 2%利益到達時
profit_tier1_threshold = 0.02        # エントリー価格の2%
profit_tier1_stop_multiplier = 1.5   # ボラティリティの1.5倍でトレーリングストップ

# Tier 2: 5%利益到達時
profit_tier2_threshold = 0.05        # エントリー価格の5%
profit_tier2_stop_multiplier = 1.0   # ボラティリティの1.0倍（より厳格）

# Tier 3: 10%利益到達時（超大勝ち）
profit_tier3_threshold = 0.10        # エントリー価格の10%
profit_tier3_stop_multiplier = 0.8   # ボラティリティの0.8倍（さらに厳格）

[TimeBasedExit]
# Time-Based Exit 戦略（Task 39d, 2026-02-08）
# 目的: 長期保有ポジションの強制決済による塩漬け防止
# NOTE: BTC版では entry_price=0 ベースライン互換のため無効のまま維持
#        XAUT版（config_xaut.ini）では有効
enable_time_based_exit = 0

# 保有時間制限（時間）
max_holding_hours = 72               # 72時間 = 3日間（240分足で18本分）

[ChandelierExit]
# Chandelier Exit 戦略（Task 44c）
# 目的: ATRベースのトレーリングストップ（PSARの代替オプション）
# 0=無効（デフォルト）, chandelier_replaces_psar=1でPSARを置換
enable_chandelier_exit = 0
chandelier_period = 22
chandelier_mult = 3.0
chandelier_replaces_psar = 0

[ProfitStepLock]
# 段階的利益ロック戦略（Task 44b）
# 目的: 利益が一定水準を超えたら損益をゼロ以下に戻さないよう動的SL調整
# 0=無効（デフォルト）
enable_profit_step_lock = 0

[VolumeClimaxExit]
# Task 44d: 出来高急増（ボリュームクライマックス）での利益確定
# 出来高が移動平均の threshold倍に達した場合、含み益があれば EXIT
# 0=無効（デフォルト）、1=有効
enable_volume_climax_exit = 0
# 出来高急増の判定倍率（移動平均の何倍以上）
volume_climax_threshold = 3.0
# クライマックス判定に使う出来高移動平均期間
volume_climax_lookback = 20
# EXIT発動に必要な最低含み益率（例: 0.005 = 0.5%以上の利益があるとき）
volume_climax_min_profit_pct = 0.005

[CompositeScoreExit]
# Task 44e: 複数指標の複合スコアによるトレンド失速検出EXIT
# ADX低下・PVO低下・Volume低下の3指標をスコアリングし、閾値以上でEXIT
# 0=無効（デフォルト）、1=有効
enable_composite_score_exit = 0
# ADX: エントリー時ADXからこの値以上低下でスコア+1
composite_exit_adx_drop = 5.0
# PVO: PVO値がこの閾値以下でスコア+1
composite_exit_pvo_threshold = 10
# Volume: 現在出来高/(20期間平均) がこの値以下でスコア+1
composite_exit_volume_ratio = 0.8
# EXITに必要な最低スコア（1-3）
composite_exit_min_score = 2
# EXIT発動に必要な最低含み益率
composite_exit_min_profit_pct = 0.005

[CostModel]
# Task 40b: コストモデル設定
# バックテストに実取引のコスト（手数料・スリッページ）を織り込む
#
# enabled: 0=無効（デフォルト）、1=有効
# maker_fee: メイカー手数料率（%）
# taker_fee: テイカー手数料率（%）
# slippage_rate: スリッページ率（%）
# execution_delay_candles: 約定遅延（足数）
# funding_rate_holding_enabled: ポジション保有中のファンディングレートコスト計上（1=有効）
enabled = 1
maker_fee = 0.02
taker_fee = 0.06
slippage_rate = 0.05
execution_delay_candles = 1
funding_rate_holding_enabled = 1

[Resilience]
# Task 40g: 本番運用の耐障害性設定
# API障害時のリトライ、アラート通知などの設定

# API障害時リトライ設定
api_retry_max_attempts = 3           # 最大リトライ回数
api_retry_initial_delay = 1.0        # 初期待機時間（秒）
api_retry_backoff_multiplier = 2.0   # バックオフ倍率（指数バックオフ）
api_retry_max_delay = 30.0           # 最大待機時間（秒）

# タイムアウト設定
api_connection_timeout = 10.0        # 接続タイムアウト（秒）
api_request_timeout = 30.0           # リクエストタイムアウト（秒）

# アラート通知設定（Discord Webhook）
alert_enabled = 0                    # 0=無効、1=有効
alert_discord_webhook_url = # Discord Webhook URL（設定時は .api_key に記載推奨）
alert_on_api_failure = 1             # API障害時に通知
alert_on_large_drawdown = 1          # 大きなDD時に通知
alert_on_consecutive_losses = 1      # 連続損失時に通知
alert_drawdown_threshold = 40.0      # DD通知閾値（%）
alert_consecutive_loss_count = 3     # 連続損失通知閾値（回）

[RiskOverlay]
# Task 40c: リスク・オーバーレイ（キルスイッチ）設定
# 初期資本100USD前提で、資産を守るための取引停止ルール
#
# enabled: 0=無効（デフォルト）、1=有効
# max_drawdown_pct: 最大DD超過で取引停止（初期資本比%）
# daily_loss_limit_pct: 日次損失上限超過で当日取引停止（初期資本比%）
# consecutive_losses_limit: 連続損失N回で取引停止
# auto_resume_next_day: 0=手動再開のみ、1=翌日自動再開（日次停止のみ）
# dd_resume_bars: H-033b DD停止後の自動再開バー数（0=永続停止, N=Nバー後再開）
#   スキャン結果: DD≤50% / 100bars(17日後) → 通年PnL +1934 / MaxDD 59.5%（ベースライン比+363 / -16.2pt）
enabled = 0
max_drawdown_pct = 50
daily_loss_limit_pct = 20.0
consecutive_losses_limit = 5
auto_resume_next_day = 1
dd_resume_bars = 100

[OtherSettings]

[ATRInitialStop]
# H-014: ATR初期ストップロス（動的ストップロス）
# 原理: エントリー時ATR×multiplierをストップ距離として固定
#      PSARより有利な位置でストップが発動する場合、早期カットで損失を削減
# BUY:  stop = entry_price - ATR×multiplier
# SELL: stop = entry_price + ATR×multiplier
# multiplierは1.5/2.0/3.0などを試す
atr_initial_stop_enabled = 0
atr_initial_stop_multiplier = 2.5

