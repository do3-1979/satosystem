# ========================================
# Trading Bot Configuration
# ========================================

[API]
# 取引所設定
exchange_data = bybit   # データ取得用取引所
exchange_trade = bitget # 実取引用取引所

[RiskManagement]
# リスク管理設定
risk_percentage = 0.30           # リスク許容率（資金の何%をリスクに晒すか）
account_balance = 300            # アカウント残高（USD）
leverage = 10                    # レバレッジ倍率
entry_times = 2                  # 分割エントリー回数
entry_range = 4                  # エントリー範囲（%）
stop_range = 1                   # ストップロス範囲（%）
stop_af = 0.02                   # PSAR加速係数（初期値）
stop_af_add = 0.02               # PSAR加速係数（加算値）
stop_af_max = 0.20               # PSAR加速係数（最大値）
surge_follow_price_ratio = 0.011 # 急騰フォロー価格比率
psar_time_frame = 240            # PSAR時間枠（分）

[Market]
# 取引市場設定
market = BTC/USDT    # 取引ペア
time_frame = 240     # 時間枠（分）

[Period]
# バックテスト期間設定
start_time = 2025/01/01 00:00
end_time = 2025/12/31 23:59

[Strategy]
# ボラティリティ計算期間（ATR/Keltner Channel用）
volatility_term = 14

# ドンチャンチャネル期間
donchian_buy_term = 30
donchian_sell_term = 30

# PVO（Percentage Volume Oscillator）設定
pvo_s_term = 5         # 短期移動平均期間
pvo_l_term = 70        # 長期移動平均期間（ベースライン設定）
pvo_threshold = 10     # PVOフィルター閾値

# PSARルックバック期間
psar_lookback_term = 100

# Strategy A: ADX戦略（メイン戦略）
enable_strategy_a_adx = 1

# Strategy B: BB/RSI/SMA複合戦略
enable_strategy_b_bb_rsi_sma = 0
bb_period = 20
bb_std_dev = 2.0
rsi_period = 14
rsi_overbought = 70
rsi_oversold = 30
sma_fast_period = 50
sma_slow_period = 200

# Strategy C: 複合戦略
enable_strategy_c_combined = 0
macd_fast_period = 12
macd_slow_period = 26
macd_signal_period = 9

# ADX（Average Directional Index）設定
adx_term = 14          # ADX計算期間
adx_continue_num = 3   # 継続判定回数
adx_bull_threshold = 24  # 強気相場閾値（ベースライン設定）
adx_bear_threshold = 18  # 弱気相場閾値

[Potfolio]
# ポートフォリオ設定
lot_limit_lower = 0.0001        # 最小ロット数
balance_tether_limit = 0        # USDT残高下限

[Setting]
# システム設定
server_retry_wait = 120   # サーバーリトライ待機時間（秒）
bot_operation_cycle = 60  # ボット動作サイクル（秒）

[Log]
# ログ設定
log_file = log.txt       # ログファイル名
log_directory = logs     # ログディレクトリ

[OrderExecution]
# 注文実行設定
entry_slippage = 0.5        # エントリー時スリッページ（%）
slippage_multiplier = 1.5   # スリッページ乗数
max_entry_retries = 4       # エントリー最大リトライ回数
max_exit_retries = 3        # イグジット最大リトライ回数
order_timeout = 30          # 注文タイムアウト（秒）

[Backtest]
# バックテスト設定
back_test = 1                     # バックテストモード（1=ON, 0=OFF）
hot_test_dummy_mode = 1           # ダミーモード（1=ON, 0=OFF）
generate_interactive_graph = 1    # グラフ生成（1=ON, 0=OFF）

[EntryFilters]
# エントリーフィルター設定
enable_pvo_filter = 1              # PVOフィルター有効化
enable_adx_filter = 1              # ADXフィルター有効化
adx_filter_threshold = 31          # ADXフィルター閾値
enable_volume_filter = 0           # ボリュームフィルター有効化
volume_filter_threshold = 15000    # ボリュームフィルター閾値
enable_volatility_filter = 0       # ボラティリティフィルター有効化
volatility_filter_threshold = 1200 # ボラティリティフィルター閾値

[Seasonality]
# 季節性ポジショニング設定
enable_seasonality_based_positioning = 0  # 季節性ポジショニング有効化
seasonality_loss_quarter_multiplier = 0.7 # 損失四半期のポジションサイズ倍率
seasonality_profit_quarter_multiplier = 1.0 # 利益四半期のポジションサイズ倍率

[MarketRegime]
# マーケットレジーム検出設定
enable_market_regime_detection = 0         # レジーム検出有効化
atr_range_threshold_lower = 0.90           # ATR下限閾値
atr_range_threshold_upper = 1.10           # ATR上限閾値
atr_period = 14                            # ATR期間
atr_ma_period = 28                         # ATR移動平均期間
swing_lookback_period = 20                 # スイングルックバック期間
enable_entry_condition_strictness_on_range = 1    # レンジ相場でのエントリー条件厳格化
ranging_position_size_multiplier = 0.7     # レンジ相場でのポジションサイズ倍率

[OtherSettings]

