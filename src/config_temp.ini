# Bitcoin 自動取引ボット設定ファイル
# 本ファイルは config.template.ini です
# バックテスト実行時は自動的に config_temp.ini がこれをベースに生成されます
# 本番運用時は config.ini を直接編集してください

[API]
# APIキーはバックテスト実行時に自動注入されます
# 本番環境では .api_key ファイルから読み込まれます
api_key = test_key_1234567890
api_secret = test_secret_abcdefghijklmnop

[RiskManagement]
# リスク管理パラメータ
risk_percentage = 0.03
account_balance = 300
leverage = 50
entry_times = 3
entry_range = 2.0
stop_range = 2.0
stop_AF = 0.02
stop_AF_add = 0.02
stop_AF_max = 0.20
surge_follow_price_ratio = 0.011
psar_time_frame = 120

[Market]
# 取引対象市場
market = BTC/USD
time_frame = 120

[Period]
# バックテスト期間
start_time = 2024/01/01 0:00
end_time = 2024/12/31 23:59

[Strategy]
# 戦略パラメータ
volatility_term = 14
donchian_buy_term = 20
donchian_sell_term = 20
keltner_ema_period = 20
keltner_atr_multiplier = 2.0
keltner_enabled = True
pvo_s_term = 12
pvo_l_term = 26
pvo_threshold = 0

[Potfolio]
# ポートフォリオ管理
lot_limit_lower = 0.0001
balance_tether_limit = 0

[Setting]
# 一般設定
server_retry_wait = 120
bot_operation_cycle = 60
run_timeout_seconds = 300
api_request_timeout_seconds = 20
api_max_retry_seconds = 120

[Log]
# ログ設定
log_file = log.txt
log_directory = logs
report_directory = report
logging_interval = 10000

[Backtest]
# バックテスト設定
back_test = 1

# 注記: 本ファイルはテンプレートです
# 個別の期間・パラメータ設定は output_configs/ に置いてください
